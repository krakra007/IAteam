<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAteam Chat</title>
  <style>
    :root{
      --bg:#212121; --side:#171717; --top:#181818; --panel:#2a2a2a;
      --line:#3f3f46; --text:#ececec; --muted:#9ca3af; --muted2:#8d939c;
      --sidebar-w: 300px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 "Söhne","ui-sans-serif",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}

    /* ── Layout racine avec flex + divider glissable ── */
    .app{display:flex;height:100vh;overflow:hidden}

    /* ── Sidebar ── */
    .sidebar{
      background:var(--side);
      border-right:1px solid var(--line);
      padding:10px;
      overflow:auto;
      height:100vh;
      width:var(--sidebar-w);
      min-width:160px;
      max-width:520px;
      flex-shrink:0;
      transition:width .18s ease, padding .18s ease, border .18s ease;
    }
    .app.sidebar-collapsed .sidebar{width:0;padding:0;border-right:0;overflow:hidden;min-width:0}

    /* ── Divider glissable ── */
    .resizer{
      width:5px;
      background:transparent;
      cursor:col-resize;
      flex-shrink:0;
      position:relative;
      z-index:10;
      transition:background .15s;
    }
    .resizer:hover,.resizer.active{background:var(--line)}
    .resizer::after{
      content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      height:32px;width:3px;border-radius:3px;background:var(--muted2);opacity:.5;
    }
    .app.sidebar-collapsed .resizer{display:none}

    /* ── Main ── */
    .main{display:flex;flex-direction:column;height:100vh;overflow:hidden;flex:1;min-width:0}

    /* ── Sidebar items ── */
    .group-title{display:flex;justify-content:space-between;align-items:center;margin:10px 6px 6px;font-size:12px;color:var(--muted)}
    .separator{border-top:1px solid #2c2c2c;margin:10px 6px}
    .item{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:8px;cursor:pointer;min-height:36px}
    .item:hover{background:#242424}
    .item.active{background:#2b2b2b}
    .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
    .icon-btn{border:0;background:none;color:var(--muted2);cursor:pointer;font-size:13px;opacity:.75;flex-shrink:0}
    .icon-btn:hover{opacity:1;color:#b8bec8}

    /* ── Bulle de couleur projet ── */
    .proj-dot{
      width:12px;height:12px;border-radius:50%;flex-shrink:0;
      box-shadow:0 0 0 2px rgba(255,255,255,.08);
    }

    /* ── Badge modèle dans la sidebar (sous le titre du chat) ── */
    .chat-model-tag{
      display:block;font-size:10px;color:var(--muted2);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      margin-top:1px;line-height:1.2;
    }
    .chat-name-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:center}

    /* ── Barre de haut ── */
    .top{display:flex;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--top);position:sticky;top:0;z-index:5}
    .btn{border:1px solid var(--line);background:transparent;color:var(--text);padding:8px 10px;border-radius:8px;cursor:pointer}
    select,input{background:#222;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px;font-family:inherit}

    /* ── Messages ── */
    .messages{flex:1;overflow:auto;padding:26px 12px;display:flex;flex-direction:column;gap:18px;min-height:0}
    .msg-row{width:min(100%,900px);margin:0 auto;display:flex}
    .msg-row.user{justify-content:flex-end}
    .msg-row.assistant{justify-content:flex-start}
    .msg-row.user > div{margin-left:auto;display:inline-flex;flex-direction:column;align-items:flex-end;max-width:min(72%,56ch)}
    .msg-row.assistant > div{display:flex;flex-direction:column;align-items:flex-start;max-width:100%}
    .msg{max-width:820px;width:fit-content;padding:8px 12px;border-radius:14px;white-space:pre-wrap;line-height:1.45}
    .msg.assistant{background:transparent;border:none;border-radius:0;padding-left:0;max-width:78ch;font-size:17px;color:#e8eaee;line-height:1.7}
    .msg.user{background:#1f6feb;color:#f8fbff;border-radius:18px;display:inline-block;width:fit-content;max-width:100%;padding:8px 12px;font-size:16px;line-height:1.5;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word}
    .msg-foot{display:flex;justify-content:flex-end;margin-top:4px;width:100%}
    .copy{background:transparent;border:0;color:#aeb4be;font-size:13px;cursor:pointer;line-height:1;padding:3px 4px;border-radius:6px}
    .copy:hover{background:#2a2a2a;color:#d6dbe3}
    .msg-actions{display:flex;gap:10px;margin-top:6px;align-items:center}
    .assistant-body p{margin:0 0 10px}
    .assistant-body h3{margin:12px 0 10px;font-size:19px;line-height:1.4}
    .assistant-body ul{margin:6px 0 12px 20px;padding:0}
    .assistant-body li{margin:6px 0;font-size:16px;line-height:1.65}
    .assistant-body blockquote{margin:10px 0;padding:8px 12px;border-left:3px solid #4b5563;background:#242424;border-radius:6px;color:#d9dde5}
    .assistant-body strong{font-weight:650}
    .msg-icon{border:0;background:transparent;color:#d0d4db;cursor:pointer;font-size:16px;line-height:1;padding:2px}
    .msg-icon:hover{color:#ffffff}

    /* ── Équations chimiques/math (rendu sans LaTeX) ── */
    .chem-eq{
      display:block;
      background:#1a2030;
      border-left:3px solid #4a80c4;
      border-radius:6px;
      padding:10px 16px;
      margin:10px 0;
      font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
      font-size:15px;
      color:#a8d4ff;
      letter-spacing:.02em;
      overflow-x:auto;
      white-space:pre;
    }
    .chem-inline{
      font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
      font-size:.93em;color:#a8d4ff;background:#1e2840;
      padding:1px 5px;border-radius:4px;
    }

    /* ── Badge provider ── */
    .provider-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-bottom:4px;font-weight:600;letter-spacing:.04em}
    .badge-openai{background:#10a37f22;color:#10a37f;border:1px solid #10a37f44}
    .badge-anthropic{background:#c8621a22;color:#c8621a;border:1px solid #c8621a44}
    .badge-deepseek{background:#4a6cf722;color:#7b9cf7;border:1px solid #4a6cf744}
    .badge-gemini{background:#4285f422;color:#7baaf7;border:1px solid #4285f444}
    .badge-groq{background:#f5501622;color:#f55016;border:1px solid #f5501644}

    /* ── Typing ── */
    .typing{display:flex;align-items:center;gap:8px;color:#b8bec8;font-size:14px}
    .typing-spinner{width:14px;height:14px;border:2px solid #4b5563;border-top-color:#d1d5db;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Composer ── */
    .composer{padding:12px;background:var(--top);border-top:1px solid var(--line)}
    .composer-wrap{max-width:900px;margin:0 auto;display:flex;gap:10px}
    textarea{flex:1;width:100%;resize:none;height:90px;border-radius:12px;background:#222;color:var(--text);border:1px solid var(--line);padding:12px 14px;font-family:inherit;font-size:17px;line-height:1.5}

    /* ── Home mode ── */
    .main.home-mode .top{border-bottom:none}
    .main.home-mode .messages{display:none}
    .main.home-mode .composer{margin:auto 0 28vh;border-top:none;background:transparent}
    .home-hero{display:none;text-align:center;color:#f3f4f6;font-size:42px;line-height:1.2;font-weight:500;margin-top:18vh}
    .main.home-mode .home-hero{display:block}
    .composer-wrap{transition:max-width .2s ease}
    .main.home-mode .composer-wrap{max-width:980px;width:min(94vw,980px);display:block}
    .main.home-mode textarea{width:100%;height:64px;border-radius:28px;padding:18px 64px 18px 20px;overflow:hidden}
    .main.home-mode .send-circle{position:absolute;right:12px;top:50%;transform:translateY(-50%)}
    .composer-box{position:relative;width:100%}
    .composer-box .send-circle{position:absolute;right:10px;bottom:10px}

    /* ── Panneaux flottants ── */
    .params{display:none;position:absolute;right:14px;top:58px;background:#1f1f1f;border:1px solid var(--line);padding:10px;border-radius:10px;width:300px;z-index:20}
    .params.open{display:block}
    .param{display:grid;grid-template-columns:1fr 95px;gap:8px;margin-bottom:8px;align-items:center}

    /* ── Bouton Envoyer ── */
    #sendBtn.send-circle{width:38px;height:38px;border-radius:999px;background:#fff;color:#111;border:none;display:inline-flex;align-items:center;justify-content:center;padding:0}
    #sendBtn.send-circle svg{width:18px;height:18px;stroke:#111;stroke-width:3.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
    #sendBtn.send-circle:hover{background:#e8e8e8}

    /* ── Erreur API ── */
    .api-error{background:#7f1d1d;color:#fca5a5;padding:10px 16px;font-size:13px;border-radius:8px;margin:8px auto;max-width:900px;display:none}
    .api-error.visible{display:block}
  </style>
</head>
<body>
<!-- VERSION_FIXED_V7 -->
<div class="app">
  <aside class="sidebar">
    <div id="chatList"></div>
  </aside>
  <div class="resizer" id="resizer"></div>

  <section class="main">
    <div class="top">
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn" id="toggleSidebarBtn" title="Ouvrir/Fermer la barre latérale">☰</button>
        <select id="modelSelect"></select>
      </div>
      <div style="display:flex;gap:8px;align-items:center;position:relative">
        <button class="btn" id="apiKeyBtn" title="Gérer les clés API">🔑</button>
        <button class="btn" id="paramsBtn">Paramètres</button>
        <div id="apiKeyPanel" class="params" style="right:90px;top:46px;width:360px">
          <div id="providerKeys" style="display:flex;flex-direction:column;gap:10px"></div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn" id="saveApiKeyBtn">Enregistrer</button>
          </div>
        </div>
      </div>
      <div id="paramsPanel" class="params"></div>
    </div>

    <div class="api-error" id="apiError"></div>
    <div class="messages" id="messages"></div>
    <div class="home-hero" id="homeHero">Qu'est-ce qui vous intéresse aujourd'hui ?</div>

    <div class="composer">
      <div class="composer-wrap"><div class="composer-box">
        <textarea id="prompt" placeholder="Poser une question"></textarea>
        <button class="send-circle" id="sendBtn" aria-label="Envoyer" title="Envoyer">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 19V6"></path>
            <path d="M6.5 11.5 12 6l5.5 5.5"></path>
          </svg>
        </button>
      </div></div>
    </div>
  </section>
</div>

<script>
// ─────────────────────────────────────────────────
// MODÈLES — groupés par fournisseur
// BUG CORRIGÉ : Claude et Gemini ajoutés ; modèles
// fictifs (gpt-5.5 etc.) marqués clairement
// ─────────────────────────────────────────────────
const MODEL_GROUPS = [
  // ── Anthropic Claude ──────────────────────────────
  // Source : platform.claude.com/docs — mai 2026
  // claude-opus-4-7   → plus capable, coding avancé, vision HD
  // claude-sonnet-4-6 → meilleur rapport vitesse/intelligence
  // claude-haiku-4-5  → le plus rapide / économique
  // claude-opus-4-6   → opus précédent (context 1M tokens)
  // claude-sonnet-4-5 → sonnet précédent (stable)
  {
    label: "Anthropic Claude",
    models: [
      "claude-opus-4-7",
      "claude-sonnet-4-6",
      "claude-haiku-4-5",
      "claude-opus-4-6",
      "claude-sonnet-4-5"
    ]
  },
  // ── OpenAI GPT-5.x ────────────────────────────────
  // Source : developers.openai.com — mai 2026
  // gpt-5.5     → flagship actuel (23 avril 2026), coding + agent
  // gpt-5.5-pro → pro, raisonnement maximal
  // gpt-5.4     → précédent flagship (mars 2026)
  // gpt-5.4-mini / nano → rapide / très économique
  // gpt-5.2     → ancienne génération (retraite juin 2026)
  {
    label: "OpenAI GPT-5",
    models: ["gpt-5.5", "gpt-5.5-pro", "gpt-5.4", "gpt-5.4-mini", "gpt-5.4-nano", "gpt-5.2"]
  },
  // ── OpenAI GPT-4 (API uniquement) ─────────────────
  // gpt-4.1 et gpt-4.1-mini restent disponibles via API
  // o3 disponible via API (o4-mini déprécié dans ChatGPT)
  {
    label: "OpenAI GPT-4 / o-series (API)",
    models: ["gpt-4.1", "gpt-4.1-mini", "o3"]
  },
  // ── Google Gemini ─────────────────────────────────
  // Source : ai.google.dev/gemini-api/docs/models — mai 2026
  // gemini-3.1-pro-preview → dernier modèle (mars 2026), raisonnement avancé
  // gemini-3-flash         → Gemini 3, équilibre vitesse/capacité
  // gemini-2.5-pro         → stable, production
  // gemini-2.5-flash       → économique, stable
  // gemini-2.5-flash-lite  → très économique
  // ⚠ gemini-2.0-flash DÉPRÉCIÉ au 1er juin 2026 → ne pas utiliser
  {
    label: "Google Gemini",
    models: [
      "gemini-3.1-pro-preview",
      "gemini-3-flash",
      "gemini-2.5-pro",
      "gemini-2.5-flash",
      "gemini-2.5-flash-lite"
    ]
  },
  // ── DeepSeek ──────────────────────────────────────
  // Source : api-docs.deepseek.com — mai 2026
  // deepseek-v4-pro   → flagship (mars 2026), agent + raisonnement
  // deepseek-v4-flash → rapide / économique
  // deepseek-chat     → alias legacy → v4-flash non-thinking (déprécié 24 juil. 2026)
  // deepseek-reasoner → alias legacy → v4-flash thinking mode (déprécié 24 juil. 2026)
  {
    label: "DeepSeek",
    models: ["deepseek-v4-pro", "deepseek-v4-flash", "deepseek-chat", "deepseek-reasoner"]
  },
  // ── Groq (Open Source, ultra-rapide via LPU) ──────
  // Source : groq.com/pricing & console.groq.com/docs/models — mai 2026
  // API compatible OpenAI → endpoint dédié api.groq.com
  {
    label: "🚀 Groq — Open Source",
    models: [
      "openai/gpt-oss-120b",
      "openai/gpt-oss-20b",
      "moonshotai/kimi-k2-instruct-0905",
      "meta-llama/llama-4-scout-17b-16e-instruct",
      "qwen/qwen3-32b",
      "llama-3.3-70b-versatile",
      "llama-3.1-8b-instant"
    ]
  }
];

const CURATED_MODELS = MODEL_GROUPS.flatMap(g => g.models);

const DEF = {
  temperature: 0.7,
  top_p: 1,
  max_tokens: 1200,   // BUG CORRIGÉ : renommé max_tokens (universel) — chaque provider le mappe
  frequency_penalty: 0,
  presence_penalty: 0,
  stop: "",
  seed: ""
};


// ── Palette couleurs projets ──
const PROJECT_COLORS = [
  "#e05c5c","#e08a3c","#d4b44a","#6abf69","#4a9fd4",
  "#7b68d4","#d46abf","#4abfbf","#a0c060","#d47b4a"
];
let _colorIdx = 0;
function nextProjectColor(){
  const c = PROJECT_COLORS[_colorIdx % PROJECT_COLORS.length];
  _colorIdx++;
  return c;
}
// ─────────────────────────────────────────────────
// ÉTAT
// ─────────────────────────────────────────────────
const S = {
  projects: JSON.parse(localStorage.getItem("projects") || "[]"),
  chats:    JSON.parse(localStorage.getItem("chats")    || "[]"),
  activeChat:    localStorage.getItem("activeChat")    || null,
  activeProject: localStorage.getItem("activeProject") || null,
  model:  localStorage.getItem("model") || CURATED_MODELS[0],
  params: (() => {
    const raw = JSON.parse(localStorage.getItem("params") || "null");
    if (!raw) return { ...DEF };
    // Migration : max_completion_tokens → max_tokens
    if (raw.max_completion_tokens != null && raw.max_tokens == null) {
      raw.max_tokens = raw.max_completion_tokens;
      delete raw.max_completion_tokens;
    }
    return { ...DEF, ...raw };
  })()
};

const el = id => document.getElementById(id);
let isWaitingResponse = false;
if (!CURATED_MODELS.includes(S.model)) S.model = CURATED_MODELS[0];

const promptEl   = el("prompt");
const apiErrorEl = el("apiError");

// ─────────────────────────────────────────────────
// CLÉS API — 4 fournisseurs
// ─────────────────────────────────────────────────
const PROVIDERS = ["ANTHROPIC", "OPENAI", "DEEPSEEK", "GOOGLE GEMINI", "GROQ"];
const providerKeysEl = el("providerKeys");
const apiKeysByProvider = JSON.parse(localStorage.getItem("apiKeysByProvider") || "{}");
PROVIDERS.forEach(p => { if (!(p in apiKeysByProvider)) apiKeysByProvider[p] = ""; });

// ─────────────────────────────────────────────────
// SAVE
// ─────────────────────────────────────────────────
function save() {
  localStorage.setItem("projects",           JSON.stringify(S.projects));
  localStorage.setItem("chats",              JSON.stringify(S.chats));
  localStorage.setItem("activeChat",         S.activeChat    || "");
  localStorage.setItem("activeProject",      S.activeProject || "");
  localStorage.setItem("model",              S.model);
  localStorage.setItem("params",             JSON.stringify(S.params));
  localStorage.setItem("apiKeysByProvider",  JSON.stringify(apiKeysByProvider));
}

const activeChat = () => S.chats.find(c => c.id === S.activeChat);

// ─────────────────────────────────────────────────
// BUG CORRIGÉ : inférence provider fiable
// ─────────────────────────────────────────────────
function inferProviderFromModel(model) {
  const m = (model || "").toLowerCase();
  if (m.startsWith("claude"))   return "ANTHROPIC";
  if (m.startsWith("gemini"))   return "GOOGLE GEMINI";
  if (m.startsWith("deepseek")) return "DEEPSEEK";
  // Groq models — détection par préfixe de famille ou nom connu
  const GROQ_MODELS = MODEL_GROUPS.find(g => g.label.includes("Groq"))?.models || [];
  if (GROQ_MODELS.includes(model)) return "GROQ";
  return "OPENAI";
}

function providerBadgeHtml(provider) {
  const map = {
    "ANTHROPIC":    ["badge-anthropic", "Claude"],
    "OPENAI":       ["badge-openai",    "OpenAI"],
    "DEEPSEEK":     ["badge-deepseek",  "DeepSeek"],
    "GOOGLE GEMINI":["badge-gemini",    "Gemini"],
    "GROQ":          ["badge-groq",      "Groq"]
  };
  const [cls, label] = map[provider] || ["badge-openai", provider];
  return `<span class="provider-badge ${cls}">${label}</span>`;
}

// ─────────────────────────────────────────────────
// AFFICHAGE CLÉS API
// ─────────────────────────────────────────────────
function renderApiKeys() {
  providerKeysEl.innerHTML = PROVIDERS.map(name => {
    const val = apiKeysByProvider[name] || "";
    const status = val ? "✓ Clé configurée" : "Aucune clé";
    const dot    = val ? "#22c55e" : "#6b7280";
    return `<div style="display:flex;flex-direction:column;gap:6px">
      <div style="font-size:12px;color:#9ca3af;font-weight:600;letter-spacing:.04em">${name}</div>
      <input data-provider="${name}" type="password" value="${val}" placeholder="Entrer la clé ${name}" />
      <div style="font-size:12px;color:#9ca3af">
        <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dot};margin-right:6px"></span>${status}
      </div>
    </div>`;
  }).join("");
}

// ─────────────────────────────────────────────────
// PROJETS & CONVERSATIONS
// ─────────────────────────────────────────────────
function ensureLandingBlankChat() {
  const c = activeChat();
  // BUG CORRIGÉ : titre cohérent "Nouveau chat" partout
  if (c && Array.isArray(c.messages) && c.messages.length === 0) return;
  const id = crypto.randomUUID();
  S.chats.unshift({ id, title: "Nouveau chat", projectId: null, messages: [] });
  S.activeChat    = id;
  S.activeProject = null;
}

function createProject() {
  const n = prompt("Nom du projet ?", "Nouveau projet");
  if (!n) return;
  const id = crypto.randomUUID();
  const color = nextProjectColor();
  S.projects.unshift({ id, name: n, color });
  S.activeProject = id;
  save(); render();
}

function renameProject(id) {
  const p = S.projects.find(x => x.id === id);
  if (!p) return;
  const n = prompt("Nouveau nom du projet", p.name);
  if (!n) return;
  p.name = n;
  save(); render();
}

function deleteProject(id) {
  if (!confirm("Supprimer ce projet et ses conversations ?")) return;
  S.projects = S.projects.filter(p => p.id !== id);
  S.chats    = S.chats.map(c => c.projectId === id ? { ...c, projectId: null } : c);
  if (S.activeProject === id) S.activeProject = null;
  save(); render();
}

function createChat(projectId = null) {
  const id = crypto.randomUUID();
  S.chats.unshift({ id, title: "Nouveau chat", projectId, messages: [] });
  S.activeChat    = id;
  S.activeProject = projectId || null;
  save(); render();
}

function renameChat(id) {
  const c = S.chats.find(x => x.id === id);
  if (!c) return;
  const n = prompt("Nouveau nom de la conversation", c.title);
  if (!n) return;
  c.title = n;
  save(); render();
}

function deleteChat(id) {
  S.chats = S.chats.filter(c => c.id !== id);
  if (S.activeChat === id) S.activeChat = S.chats[0]?.id || null;
  save(); render();
}

function chatRow(c, indent = false) {
  const d = document.createElement("div");
  d.className = "item" + (c.id === S.activeChat ? " active" : "");

function escapeHtml(str) {
  return (str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function formatInline(text) {
  let safe = escapeHtml(text);
  safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  safe = safe.replace(/`(.+?)`/g, "<code style='background:#333;padding:1px 5px;border-radius:4px;font-size:.9em'>$1</code>");
  return safe;
}


// ─────────────────────────────────────────────────────
// CONVERSION LATEX → HTML (chimie, maths)
// Pas de dépendance externe — rendu professionnel
// ─────────────────────────────────────────────────────
function convertLatex(text) {
  if (!text) return text;

  // Table de conversion : séquences LaTeX → Unicode/HTML
  const SYM = [
    // Flèches
    [/\\rightarrow/g,  "→"],
    [/\\leftarrow/g,   "←"],
    [/\\leftrightarrow/g, "⇌"],
    [/\\Rightarrow/g,  "⟹"],
    [/\\Leftarrow/g,   "⟸"],
    [/\\longrightarrow/g, "⟶"],
    [/\\longleftarrow/g,  "⟵"],
    // Opérateurs et relations
    [/\\cdot/g,   "·"],
    [/\\times/g,  "×"],
    [/\\div/g,    "÷"],
    [/\\pm/g,     "±"],
    [/\\mp/g,     "∓"],
    [/\\leq/g,    "≤"],
    [/\\geq/g,    "≥"],
    [/\\neq/g,    "≠"],
    [/\\approx/g, "≈"],
    [/\\equiv/g,  "≡"],
    [/\\propto/g, "∝"],
    [/\\infty/g,  "∞"],
    [/\\partial/g,"∂"],
    [/\\Delta/g,  "Δ"],
    [/\\nabla/g,  "∇"],
    [/\\sum/g,    "∑"],
    [/\\prod/g,   "∏"],
    [/\\int/g,    "∫"],
    // Lettres grecques
    [/\\alpha/g,"α"],[/\\beta/g,"β"],[/\\gamma/g,"γ"],[/\\delta/g,"δ"],
    [/\\epsilon/g,"ε"],[/\\zeta/g,"ζ"],[/\\eta/g,"η"],[/\\theta/g,"θ"],
    [/\\kappa/g,"κ"],[/\\lambda/g,"λ"],[/\\mu/g,"μ"],[/\\nu/g,"ν"],
    [/\\xi/g,"ξ"],[/\\pi/g,"π"],[/\\rho/g,"ρ"],[/\\sigma/g,"σ"],
    [/\\tau/g,"τ"],[/\\upsilon/g,"υ"],[/\\phi/g,"φ"],[/\\chi/g,"χ"],
    [/\\psi/g,"ψ"],[/\\omega/g,"ω"],
    [/\\Gamma/g,"Γ"],[/\\Lambda/g,"Λ"],[/\\Sigma/g,"Σ"],[/\\Phi/g,"Φ"],
    [/\\Psi/g,"Ψ"],[/\\Omega/g,"Ω"],
    // Chimie spécifique
    [/\\ce\{([^}]+)\}/g, (_, c) => convertChemFormula(c)],
    [/\\text\{([^}]+)\}/g, "$1"],
    [/\\mathrm\{([^}]+)\}/g, "$1"],
    [/\\mathbf\{([^}]+)\}/g, "<strong>$1</strong>"],
    [/\\mathit\{([^}]+)\}/g, "<em>$1</em>"],
    // Nettoyages restants
    [/\\\s/g, " "],
    [/\\,/g,  " "],
    [/\\!/g,  ""],
    [/\\\[/g, ""],
    [/\\\]/g, ""],
  ];

  // Convertit une formule chimique brute (ex: CH_3Br)
  function convertChemFormula(s) {
    return s
      .replace(/\^(\{[^}]+\}|[-+\d]+)/g, (_, e) => {
        const content = e.replace(/[{}]/g, "");
        return `<sup>${content}</sup>`;
      })
      .replace(/_(\{[^}]+\}|\d+)/g, (_, e) => {
        const content = e.replace(/[{}]/g, "");
        return `<sub>${content}</sub>`;
      });
  }

  // Applique les substitutions simples sur une chaîne
  function applySymbols(s) {
    for (const [re, rep] of SYM) s = s.replace(re, rep);
    // Exposants ^{...} ou ^X
    s = s.replace(/\^\{([^}]+)\}/g, (_, c) => `<sup>${c}</sup>`);
    s = s.replace(/\^([A-Za-z0-9+\-])/g, (_, c) => `<sup>${c}</sup>`);
    // Indices _{...} ou _X
    s = s.replace(/_\{([^}]+)\}/g, (_, c) => `<sub>${c}</sub>`);
    s = s.replace(/_([A-Za-z0-9])/g, (_, c) => `<sub>${c}</sub>`);
    // Fractions \frac{a}{b}
    s = s.replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g,
      (_, n, d) => `<span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;font-size:.85em;line-height:1.15"><span style="border-bottom:1px solid currentColor;padding:0 4px">${n}</span><span style="padding:0 4px">${d}</span></span>`);
    // Racines \sqrt{x}
    s = s.replace(/\\sqrt\{([^}]+)\}/g, (_, c) => `√(${c})`);
    // Crochets / parenthèses LaTeX
    s = s.replace(/\\left\(/g,"(").replace(/\\right\)/g,")");
    s = s.replace(/\\left\[/g,"[").replace(/\\right\]/g,"]");
    s = s.replace(/\\left\\{/g,"{").replace(/\\right\\}/g,"}");
    s = s.replace(/\\left\|/g,"‖").replace(/\\right\|/g,"‖");
    // Accolades restantes vides
    s = s.replace(/\{([^{}]*)\}/g, "$1");
    return s.trim();
  }

  // Traite les blocs $$ ... $$ (display math → bloc stylé)
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, inner) => {
    const rendered = applySymbols(inner);
    return `\n<span class="chem-eq">${rendered}</span>\n`;
  });

  // Traite les blocs $ ... $ (inline math)
  text = text.replace(/\$([^\$\n]+?)\$/g, (_, inner) => {
    const rendered = applySymbols(inner);
    return `<span class="chem-inline">${rendered}</span>`;
  });

  // Traite les \[ ... \] (display math alternatif)
  text = text.replace(/\\\[([\s\S]+?)\\\]/g, (_, inner) => {
    const rendered = applySymbols(inner);
    return `\n<span class="chem-eq">${rendered}</span>\n`;
  });

  return text;
}

function formatAssistantContent(text) {
  // Convertir LaTeX en HTML avant tout traitement Markdown
  text = convertLatex(text || "");
  const lines  = text.split("\n");
  const blocks = [];
  let list = [];

  const flushList = () => {
    if (!list.length) return;
    blocks.push(`<ul>${list.map(i => `<li>${formatInline(i)}</li>`).join("")}</ul>`);
    list = [];
  };

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) { flushList(); continue; }

    if (/^#{1,6}\s+/.test(line)) {
      flushList();
      blocks.push(`<p><strong>${formatInline(line.replace(/^#{1,6}\s+/, ""))}</strong></p>`);
      continue;
    }
    if (/^>\s+/.test(line)) {
      flushList();
      blocks.push(`<blockquote>${formatInline(line.replace(/^>\s+/, ""))}</blockquote>`);
      continue;
    }
    if (/^[-•*]\s+/.test(line) || /^\d+[\.)]\s+/.test(line)) {
      list.push(line.replace(/^([-•*]|\d+[\.)])\s+/, ""));
    } else {
      flushList();
      blocks.push(`<p>${formatInline(line)}</p>`);
    }
  }
  flushList();
  return blocks.join("") || `<p>${formatInline(text || "")}</p>`;
}

function renderMessages() {
  const box = el("messages");
  box.innerHTML = "";
  const c = activeChat();
  if (!c) return;

  c.messages.forEach(m => {
    const row  = document.createElement("div");
    row.className = "msg-row " + m.role;

    const wrap = document.createElement("div");

    // Badge provider sur la première réponse assistante
    if (m.role === "assistant" && m.provider) {
      const badge = document.createElement("div");
      badge.innerHTML = providerBadgeHtml(m.provider);
      wrap.appendChild(badge);
    }

    const d = document.createElement("div");
    d.className = "msg " + m.role;
    if (m.role === "assistant") {
      d.innerHTML = `<div class="assistant-body">${formatAssistantContent(m.content)}</div>`;
    } else {
      d.textContent = m.content;
    }
    wrap.appendChild(d);

    const foot = document.createElement("div");
    foot.className = "msg-foot";

    if (m.role === "assistant") {
      const actions = document.createElement("div");
      actions.className = "msg-actions";

      const copyBtn = document.createElement("button");
      copyBtn.className = "msg-icon"; copyBtn.textContent = "⧉"; copyBtn.title = "Copier";
      copyBtn.onclick = () => navigator.clipboard.writeText(m.content);

      const regenBtn = document.createElement("button");
      regenBtn.className = "msg-icon"; regenBtn.textContent = "↻"; regenBtn.title = "Régénérer";
      regenBtn.onclick = () => {
        const lastUser = [...c.messages].reverse().find(x => x.role === "user");
        if (!lastUser) return;
        promptEl.value = lastUser.content;
        send();
      };

      actions.append(copyBtn, regenBtn);
      foot.appendChild(actions);
    } else {
      const b = document.createElement("button");
      b.className = "copy"; b.textContent = "⧉"; b.title = "Copier";
      b.onclick = () => navigator.clipboard.writeText(m.content);
      foot.appendChild(b);
    }

    wrap.appendChild(foot);
    row.appendChild(wrap);
    box.appendChild(row);
  });

  if (isWaitingResponse) {
    const row = document.createElement("div");
    row.className = "msg-row assistant";
    const wrap = document.createElement("div");
    const typing = document.createElement("div");
    typing.className = "typing";
    typing.innerHTML = '<span class="typing-spinner" aria-hidden="true"></span><span>Le modèle réfléchit…</span>';
    wrap.appendChild(typing);
    row.appendChild(wrap);
    box.appendChild(row);
  }

  box.scrollTop = box.scrollHeight;
}

async function loadModelsFromApi() {

  try {
    const r = await fetch("https://api.openai.com/v1/models", {
      headers: { "Authorization": "Bearer " + key }
    });
    const data = await r.json();
    const ids  = new Set((data.data || []).map(m => m.id).filter(Boolean));

    // Fallback silencieux — liste statique conservée
  }
}

/**
 * OpenAI & DeepSeek utilisent le format Chat Completions.
 * DeepSeek est compatible OpenAI mais sur son propre endpoint.
 */
async function callOpenAICompatible(endpoint, key, model, messages) {
  const body = {
    model,
    messages: messages.map(m => ({ role: m.role, content: m.content })),
    temperature:       S.params.temperature,
    top_p:             S.params.top_p,
    max_completion_tokens: S.params.max_tokens,  // paramètre correct pour GPT-4.1+
    frequency_penalty: S.params.frequency_penalty ?? 0,
    presence_penalty:  S.params.presence_penalty  ?? 0,
    ...(S.params.stop ? { stop: S.params.stop } : {}),
    ...(S.params.seed !== "" && S.params.seed != null ? { seed: Number(S.params.seed) } : {})
  };

  const r = await fetch(endpoint, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + key
    },
    body: JSON.stringify(body)
  });

  const d = await r.json();

  // Gestion d'erreur structurée
  if (d.error) throw new Error(`[${d.error.code || "API"}] ${d.error.message}`);

  return d.choices?.[0]?.message?.content || JSON.stringify(d);
}

/**
 * Anthropic Claude — format totalement différent :
 *  - Header : x-api-key (pas Authorization: Bearer)
 *  - Endpoint : /v1/messages
 *  - Réponse : data.content[0].text
 *  - Paramètre : max_tokens (pas max_completion_tokens)
 *  - Pas de frequency_penalty / presence_penalty / n / seed
 */
async function callAnthropic(key, model, messages) {
  const body = {
    model,
    max_tokens: S.params.max_tokens || 1200,
    messages: messages
      .filter(m => m.role === "user" || m.role === "assistant")
      .map(m => ({ role: m.role, content: m.content })),
    temperature: Math.min(S.params.temperature, 1),  // Anthropic max = 1
    top_p:       S.params.top_p
  };

  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type":      "application/json",
      "x-api-key":         key,                    // ← Header Anthropic (pas Bearer)
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify(body)
  });

  const d = await r.json();

  if (d.error) throw new Error(`[Anthropic ${d.error.type}] ${d.error.message}`);

  return d.content?.[0]?.text || JSON.stringify(d);
}

/**
 * Google Gemini — endpoint compatible OpenAI disponible
 * via l'API generativelanguage.googleapis.com
 */
async function callGemini(key, model, messages) {
  const r = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions",
    {
      method: "POST",
      headers: {
        "Content-Type":  "application/json",
        "Authorization": "Bearer " + key
      },
      body: JSON.stringify({
        model,
        messages: messages
          .filter(m => m.role === "user" || m.role === "assistant")
          .map(m => ({ role: m.role, content: m.content })),
        temperature: S.params.temperature,
        max_tokens:  S.params.max_tokens
      })
    }
  );

  const d = await r.json();

  if (d.error) throw new Error(`[Gemini ${d.error.code || ""}] ${d.error.message}`);

  return d.choices?.[0]?.message?.content || JSON.stringify(d);
}


/**
 * Groq — API compatible OpenAI mais endpoint propre.
 * Ultra-rapide (LPU), modèles open source.
 * Pas de frequency_penalty ni presence_penalty pour certains modèles.
 */
async function callGroq(key, model, messages) {
  const body = {
    model,
    messages: messages
      .filter(m => m.role === "user" || m.role === "assistant")
      .map(m => ({ role: m.role, content: m.content })),
    temperature: S.params.temperature,
    top_p:       S.params.top_p,
    max_tokens:  S.params.max_tokens || 1200,
    ...(S.params.stop ? { stop: S.params.stop } : {})
  };

  const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type":  "application/json",
      "Authorization": "Bearer " + key
    },
    body: JSON.stringify(body)
  });

  const d = await r.json();
  if (d.error) throw new Error(`[Groq ${d.error.code || ""}] ${d.error.message}`);
  return d.choices?.[0]?.message?.content || JSON.stringify(d);
}
// ─────────────────────────────────────────────────
// ENVOI — aiguillage selon le provider
// ─────────────────────────────────────────────────
async function send() {
  const provider = inferProviderFromModel(S.model);
  const key      = (apiKeysByProvider[provider] || "").trim();

  if (!key) {
    showApiError(`⚠ Aucune clé API configurée pour ${provider}. Cliquez sur 🔑 pour l'ajouter.`);
    return;
  }

  const text = promptEl.value.trim();
  if (!text) return;

  let c = activeChat();
  if (!c) { createChat(null); c = activeChat(); }

  c.messages.push({ role: "user", content: text });

  // BUG CORRIGÉ : titre cohérent ("Nouveau chat" dans les deux endroits)
  if (c.title === "Nouveau chat") c.title = text.slice(0, 38);

  promptEl.value      = "";
  isWaitingResponse   = true;
  render();

  try {
    let responseContent;

    if (provider === "ANTHROPIC") {
      responseContent = await callAnthropic(key, S.model, c.messages);

    } else if (provider === "GOOGLE GEMINI") {
      responseContent = await callGemini(key, S.model, c.messages);

    } else if (provider === "GROQ") {
      responseContent = await callGroq(key, S.model, c.messages);

    } else if (provider === "DEEPSEEK") {
      // BUG CORRIGÉ : endpoint DeepSeek propre (pas OpenAI)
      responseContent = await callOpenAICompatible(
        "https://api.deepseek.com/chat/completions",
        key, S.model, c.messages
      );

    } else {
      // OpenAI par défaut
      responseContent = await callOpenAICompatible(
        "https://api.openai.com/v1/chat/completions",
        key, S.model, c.messages
      );
    }

    // On stocke provider ET modèle pour badge + sidebar
    c.messages.push({ role: "assistant", content: responseContent, provider, model: S.model });

  } catch (e) {
    c.messages.push({ role: "assistant", content: "❌ Erreur : " + e.message, provider, model: S.model });
    showApiError(e.message);
  } finally {
    isWaitingResponse = false;
  }

  save();
  render();
}

// ─────────────────────────────────────────────────
// ÉVÉNEMENTS
// ─────────────────────────────────────────────────
el("sendBtn").onclick = send;

const appEl = document.querySelector(".app");
if (localStorage.getItem("sidebarCollapsed") === "1") appEl.classList.add("sidebar-collapsed");

el("toggleSidebarBtn").onclick = () => {
  appEl.classList.toggle("sidebar-collapsed");
  localStorage.setItem("sidebarCollapsed",
    appEl.classList.contains("sidebar-collapsed") ? "1" : "0");
};

el("modelSelect").onchange = e => { S.model = e.target.value; save(); };
el("paramsBtn").onclick    = () => el("paramsPanel").classList.toggle("open");

promptEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// Clés API
el("apiKeyBtn").onclick   = () => el("apiKeyPanel").classList.toggle("open");
el("saveApiKeyBtn").onclick = async () => {
  providerKeysEl.querySelectorAll("input[data-provider]").forEach(inp => {
    apiKeysByProvider[inp.dataset.provider] = inp.value.trim();
  });
  save();
  renderApiKeys();
  await loadModelsFromApi();
};

// Fermeture des panneaux si clic ailleurs
document.addEventListener("click", e => {
  const panel   = el("paramsPanel");
  const apiPanel = el("apiKeyPanel");
  if (!el("paramsBtn").contains(e.target) && !panel.contains(e.target))
    panel.classList.remove("open");
  if (!el("apiKeyBtn").contains(e.target) && !apiPanel.contains(e.target))
    apiPanel.classList.remove("open");
});


// ─────────────────────────────────────────────────────
// DIVIDER GLISSABLE entre sidebar et main
// ─────────────────────────────────────────────────────
(function initResizer(){
  const resizer  = el("resizer");
  const sidebar  = document.querySelector(".sidebar");
  let dragging = false, startX = 0, startW = 0;

  resizer.addEventListener("mousedown", e => {
    if(appEl.classList.contains("sidebar-collapsed")) return;
    dragging = true;
    startX   = e.clientX;
    startW   = sidebar.offsetWidth;
    resizer.classList.add("active");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
    e.preventDefault();
  });

  document.addEventListener("mousemove", e => {
    if(!dragging) return;
    const delta = e.clientX - startX;
    const newW  = Math.min(520, Math.max(160, startW + delta));
    sidebar.style.width = newW + "px";
    document.documentElement.style.setProperty("--sidebar-w", newW + "px");
  });

  document.addEventListener("mouseup", () => {
    if(!dragging) return;
    dragging = false;
    resizer.classList.remove("active");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
    // Mémoriser la largeur
    localStorage.setItem("sidebarWidth", sidebar.offsetWidth);
  });

  // Restaurer largeur
  const saved = localStorage.getItem("sidebarWidth");
  if(saved && !isNaN(saved)){
    const w = Math.min(520, Math.max(160, +saved));
    sidebar.style.width = w + "px";
    document.documentElement.style.setProperty("--sidebar-w", w + "px");
  }
})();
// ─────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────
if (!S.chats.length) createChat(null);
ensureLandingBlankChat();
renderApiKeys();
renderModels();
renderParams();
render();
loadModelsFromApi();
</script>
