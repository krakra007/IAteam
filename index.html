<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAteam Chat</title>
  <style>
    :root{--bg:#212121;--panel:#171717;--panel2:#2f2f2f;--text:#ececec;--muted:#a1a1aa;--line:#3f3f46;--accent:#10a37f}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
    .app{display:grid;grid-template-columns:280px 1fr;height:100vh}
    .sidebar{background:var(--panel);border-right:1px solid var(--line);padding:12px;display:flex;flex-direction:column;gap:10px}
    .btn{background:transparent;border:1px solid var(--line);color:var(--text);padding:10px;border-radius:10px;cursor:pointer}
    .btn.primary{border-color:var(--accent)} .btn:hover{background:#242424}
    .chats{overflow:auto;display:flex;flex-direction:column;gap:6px}
    .chat-item{padding:10px;border-radius:8px;cursor:pointer;color:#ddd}.chat-item:hover{background:#242424}.chat-item.active{background:#2b2b2b}
    .main{display:flex;flex-direction:column}
    .top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--panel)}
    .top-left,.top-right{display:flex;gap:8px;align-items:center}
    select,input{background:#222;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 10px}
    .messages{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
    .msg{max-width:920px;padding:14px;border-radius:12px;white-space:pre-wrap;line-height:1.5}
    .user{align-self:flex-end;background:#2b2b2b}.assistant{align-self:flex-start;background:transparent;border:1px solid var(--line)}
    .copy{margin-top:8px;font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none}
    .composer{padding:14px;border-top:1px solid var(--line);background:var(--panel)}
    .composer-wrap{max-width:980px;margin:0 auto;display:flex;gap:10px}
    textarea{flex:1;resize:none;height:90px;background:#222;border:1px solid var(--line);color:var(--text);border-radius:12px;padding:12px}
    .params{display:none;position:absolute;right:14px;top:56px;background:#1d1d1d;border:1px solid var(--line);padding:12px;border-radius:12px;width:320px;z-index:10}
    .params.open{display:block}.param{display:grid;grid-template-columns:1fr 90px;gap:8px;align-items:center;margin-bottom:8px}
    .tiny{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <button class="btn primary" id="newChat">+ Nouveau chat</button>
    <a class="btn" href="index.html" download="iateam-chat.html">⬇ Télécharger HTML</a>
    <div class="chats" id="chatList"></div>
  </aside>
  <section class="main">
    <div class="top">
      <div class="top-left">
        <label>Modèle</label>
        <select id="modelSelect"></select>
      </div>
      <div class="top-right">
        <input id="apiKey" type="password" placeholder="Clé API OpenAI" style="min-width:280px"/>
        <button class="btn" id="paramsBtn">Paramètres LLM</button>
      </div>
      <div id="paramsPanel" class="params"></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="composer"><div class="composer-wrap">
      <textarea id="prompt" placeholder="Écris un message..."></textarea>
      <button class="btn primary" id="sendBtn">Envoyer</button>
    </div></div>
  </section>
</div>
<script>
const MODELS=["gpt-4.1","gpt-4.1-mini","gpt-4.1-nano","gpt-4o","gpt-4o-mini","o4-mini","o3","o3-mini"];
const DEFAULT_PARAMS={temperature:0.7,top_p:1,max_tokens:1200,frequency_penalty:0,presence_penalty:0,top_k:0};
const S={chats:JSON.parse(localStorage.getItem('mini_chats')||'[]'),active:localStorage.getItem('mini_active')||null,model:localStorage.getItem('mini_model')||MODELS[1],params:JSON.parse(localStorage.getItem('mini_params')||'null')||DEFAULT_PARAMS};
const apiKeyEl=document.getElementById('apiKey');
const chatList=document.getElementById('chatList');
const messages=document.getElementById('messages');
const promptEl=document.getElementById('prompt');
const modelSelect=document.getElementById('modelSelect');
const paramsPanel=document.getElementById('paramsPanel');
const paramsBtn=document.getElementById('paramsBtn');
apiKeyEl.value=localStorage.getItem('mini_api_key')||'';
apiKeyEl.onchange=()=>localStorage.setItem('mini_api_key',apiKeyEl.value.trim());
function save(){localStorage.setItem('mini_chats',JSON.stringify(S.chats));localStorage.setItem('mini_active',S.active||'');localStorage.setItem('mini_model',S.model);localStorage.setItem('mini_params',JSON.stringify(S.params));}
function activeChat(){return S.chats.find(c=>c.id===S.active)}
function createChat(){const id=crypto.randomUUID();S.chats.unshift({id,title:'Nouveau chat',messages:[]});S.active=id;save();render();}
function renderChats(){const wrap=chatList;wrap.innerHTML='';S.chats.forEach(c=>{const d=document.createElement('div');d.className='chat-item'+(c.id===S.active?' active':'');d.textContent=c.title;d.onclick=()=>{S.active=c.id;save();render();};wrap.appendChild(d);});}
function renderMessages(){const box=messages;box.innerHTML='';const c=activeChat();if(!c)return;c.messages.forEach(m=>{const d=document.createElement('div');d.className='msg '+m.role;d.textContent=m.content;const b=document.createElement('button');b.className='copy';b.textContent='Copier';b.onclick=()=>navigator.clipboard.writeText(m.content);d.appendChild(b);box.appendChild(d);});box.scrollTop=box.scrollHeight;}
function render(){renderChats();renderMessages();}
function renderModels(){modelSelect.innerHTML=MODELS.map(m=>`<option ${m===S.model?'selected':''}>${m}</option>`).join('');}
function renderParams(){paramsPanel.innerHTML=`
  <div class='param'><label>temperature</label><input id='p_temperature' type='number' step='0.1' min='0' max='2' value='${S.params.temperature}'></div>
  <div class='param'><label>top_p</label><input id='p_top_p' type='number' step='0.05' min='0' max='1' value='${S.params.top_p}'></div>
  <div class='param'><label>max_tokens</label><input id='p_max_tokens' type='number' step='1' min='100' max='16000' value='${S.params.max_tokens}'></div>
  <div class='param'><label>freq_penalty</label><input id='p_frequency_penalty' type='number' step='0.1' min='-2' max='2' value='${S.params.frequency_penalty}'></div>
  <div class='param'><label>presence_penalty</label><input id='p_presence_penalty' type='number' step='0.1' min='-2' max='2' value='${S.params.presence_penalty}'></div>
  <div class='param'><label>top_k</label><input id='p_top_k' type='number' step='1' min='0' max='200' value='${S.params.top_k}'></div>
  <div class='tiny'>Note: top_k n'est pas pris en charge par l'API OpenAI Chat Completions.</div>`;
  paramsPanel.querySelectorAll('input').forEach(i=>i.onchange=()=>{const k=i.id.replace('p_','');S.params[k]=Number(i.value);save();});
}
async function send(){const key=apiKeyEl.value.trim();if(!key)return alert('Ajoute ta clé API OpenAI.');const t=promptEl.value.trim();if(!t)return;let c=activeChat();if(!c){createChat();c=activeChat();}
c.messages.push({role:'user',content:t});if(c.title==='Nouveau chat')c.title=t.slice(0,40);promptEl.value='';render();
try{const body={model:S.model,messages:c.messages.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.content})),temperature:S.params.temperature,top_p:S.params.top_p,max_tokens:S.params.max_tokens,frequency_penalty:S.params.frequency_penalty,presence_penalty:S.params.presence_penalty};
const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify(body)});
const data=await r.json();const out=data.choices?.[0]?.message?.content||('Erreur API: '+JSON.stringify(data));c.messages.push({role:'assistant',content:out});}
catch(e){c.messages.push({role:'assistant',content:'Erreur réseau: '+e.message});}
save();render();}
document.getElementById('newChat').onclick=()=>createChat();
document.getElementById('sendBtn').onclick=send;
promptEl.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')send();});
modelSelect.onchange=()=>{S.model=modelSelect.value;save();};paramsBtn.onclick=()=>paramsPanel.classList.toggle('open');
if(!S.chats.length)createChat();renderModels();renderParams();render();
</script>
</body>
</html>
